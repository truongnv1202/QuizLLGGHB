services:
  postgres:
    image: postgres:16-alpine
    container_name: quizllgghb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quizllgghb}
      POSTGRES_USER: ${POSTGRES_USER:-quizllgghb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-quizllgghb} -d ${POSTGRES_DB:-quizllgghb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    container_name: quizllgghb-migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-quizllgghb}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-quizllgghb}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    container_name: quizllgghb-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-quizllgghb}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-quizllgghb}?schema=public
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  uploads_data:
